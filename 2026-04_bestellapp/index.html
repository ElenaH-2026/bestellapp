<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BestellAPP</title>
    <link rel="shortcut icon" href="./assets/icons/logo-symbol.svg" type="image/x-icon">

    <script src="./scripts/db.js"></script>
    <script src="./scripts/templates.js"></script>
    <script src="./script.js"></script>

    <link rel="stylesheet" href="./styles/fonts.css">
    <link rel="stylesheet" href="./styles/standard.css">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./styles/assets.css">
    <link rel="stylesheet" href="./styles/basket.css">
</head>
<body onload="init()">
    <header class="wrapper">
        <div class="header-container">
            <img class="header-logo"
                src="./assets/icons/logo-symbol-und-text.svg" 
                alt="Bestell App">
            <img class="nav-icon"
                src="./assets/icons/menu.svg" 
                alt="Navigationsmenü">
        </div>
    </header>
    <main>
        <section id="#HeroSection" class="wrapper">
            <div class="hero-image"></div>
            <img class="hero-logo"
                src="./assets/icons/logo-BurgerHouse.png" 
                alt="BurgerHouse">
            <div class="hero-text">
                <div class="h1-container">
                    <h1><span>Burger</span>House</h1>
                    <div class="star-container">
                        <img class="rating-star"
                        src="./assets/icons/star.svg" 
                        alt="Stern">
                        <p class="font-20px-400 font-palanquin-dark">4,1</p>
                        <p class="font-18px-400 color-number-of-ratings">(317)</p>
                    </div>
                </div>
                <p class="font-24px-600">The best of Burgers, Pizza, and Greens, all in one great place.</p>
            </div>
        </section>

        <section class="dishes-and-basket-section wrapper">
            <section>
                <section id="SectionBurger">
                    <div class="category-seperator"></div>
                    <div class="h2-container">
                        <img class="category-icon burger-icon"
                            src="./assets/icons/burger.png" 
                            alt="Burger">
                        <h2>Burger</h2>
                    </div>
                    <div id="#ContainerBurger"
                        class="category-container">
                    </div>
                </section>

                <section id="SectionPizza">
                    <div class="category-seperator"></div>
                    <div class="h2-container">
                        <img class="category-icon"
                            src="./assets/icons/pizza.png" 
                            alt="Pizza">
                        <h2>Pizza <span>(30 cm)</span></h2>
                    </div>
                    <div id="#ContainerPizza"
                        class="category-container">
                    </div>
                </section>

                <section id="SectionSalad">
                    <div class="category-seperator"></div>
                    <div class="h2-container">
                        <img class="category-icon"
                            src="./assets/icons/salad.png" 
                            alt="Salat">
                        <h2>Salad</h2>
                    </div>
                    <div id="#ContainerSalad"
                        class="category-container">
                    </div>
                </section> 
            </section>

            <aside id="#Basket">
                <!-- <div class="basket">
                    <h3>Your Basket</h3>
                    <p class="p-empty-basket">Nothing here yet.<br>Go ahead and choose something delicious!</p>
                    <img class=""
                        src="./assets/icons/shopping_cart_big.svg" 
                        alt="Einkaufswagen-Icon">
                </div> -->
                <div class="basket">
                    <h3>Your Basket</h3>
                    <div id="#ContainerChoosenDishes"
                        class="choosen-dishes-container">
                        
                    </div>
                    <div class="money-calculation">
                        <table>
                            <tr class="font-20px-600">
                                <td>Subtotal</td>
                                <td id="#Subtotal"></td>
                            </tr>
                            <tr class="font-20px-600">
                                <td>Delivery fee</td>
                                <td id="#DeliveryFee"></td>
                            </tr>
                            <tr class="font-22px-700">
                                <th>Total </th>
                                <th id="#Total"></th>
                            </tr>

                        </table>
                        <button id="#BuyNow"
                            class="btn-buy-now">
                        </button>  
                    </div>
                </div>

            </aside>

        </section>
        

        
    </main>
    <footer class="wrapper font-18px-400">
        <div class="footer-container">
            <a href="##HeroSection">
                <img class="copyright-symbol"
                    src="./assets/icons/copyright.svg" 
                    alt="Copyright">
                2025 BurgerHouse
            </a>
            <a href="#">Imprint</a>
            <a href="#">Cookie Preferences</a>
        </div>
        <div class="footer-nav-bar">
            <a href="##HeroSection">
                <img class=""
                    src="./assets/icons/home-white.svg" 
                    alt="xxx">
            </a>
            <a href="#">
                <img class=""
                    src="./assets/icons/home-white.svg" 
                    alt="xxx">
            </a>
            <a href="##HeroSection">
                <img class=""
                    src="./assets/icons/home-white.svg" 
                    alt="xxx">
            </a>
            <a href="#">
                <img class=""
                    src="./assets/icons/home-white.svg" 
                    alt="xxx">
            </a>
        </div>
    </footer>
</body>

</html>
